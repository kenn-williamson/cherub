# Cherub default policy
# Deny by default — only explicitly listed actions are permitted.

# ─── Bash tool ───────────────────────────────────────────────────────────────
#
# IMPORTANT: The bash tool runs in-process in the same OS context as the cherub
# runtime. This means it shares the same filesystem, environment variables, and
# working directory as the runtime itself.
#
# In-process bash is appropriate for:
#   - Trusted developer workstations where the agent is acting on your behalf.
#   - Personal productivity workflows where you own the environment.
#
# In-process bash is NOT appropriate for:
#   - Production deployments serving multiple users.
#   - Environments where the agent has access to secrets (API keys, credentials)
#     and could read or exfiltrate them via shell commands (e.g., `cat .env`).
#   - Untrusted workloads of any kind.
#
# For sandboxed bash, use `--sandbox-bash` (CLI) or `CHERUB_SANDBOX_BASH=1`
# (Telegram). This replaces in-process bash with a container-sandboxed
# equivalent that runs in an isolated filesystem with no access to the host
# environment, process tree, secrets, or policy file. The agent's workspace
# is bind-mounted at /workspace (read-write). The container has full network
# access and build tools for compiling/testing projects.
#
# Requires: Docker daemon + `cherub-sandbox-bash:latest` image.
# Build (base):      docker build -t cherub-sandbox-bash:latest tools/container/sandbox-bash/
# Build (with Rust): docker build --build-arg LANGUAGES="rust" -t cherub-sandbox-bash:latest tools/container/sandbox-bash/

[tools.bash]
enabled = true

# Tool-level constraints apply to every action. Failure is always a hard reject.
# Example (uncomment to restrict bash to a specific working directory):
# constraints = [
#     { field = "working_dir", op = "contains", value = "/home/user/project" },
# ]

[tools.bash.actions.read]
tier = "observe"
patterns = [
    "^ls ",
    "^cat ",
    "^find ",
    "^grep ",
    "^rg ",
    "^head ",
    "^tail ",
    "^wc ",
    "^file ",
    "^which ",
    "^echo ",
    "^pwd$",
    "^env$",
    "^whoami$",
]

[tools.bash.actions.write]
tier = "act"
patterns = [
    "^mkdir ",
    "^cp ",
    "^mv ",
    "^touch ",
    "^tee ",
    "^git ",
]
# Action-level constraints apply to this specific action.
# on_constraint_failure = "reject" (default) or "escalate" (ask the human).
# Example (uncomment to block path traversal, escalating instead of rejecting):
# constraints = [
#     { field = "command", op = "not_contains", value = ".." },
# ]
# on_constraint_failure = "escalate"

[tools.bash.actions.destructive]
tier = "commit"
patterns = [
    "^rm ",
    "^chmod ",
    "^chown ",
    "^kill ",
    "^pkill ",
    "^sudo ",
    "^apt ",
    "^pip install",
    "^cargo install",
]

# ─── File tool ────────────────────────────────────────────────────────────────
#
# Structured file operations (read, edit, glob, grep) with workspace containment.
# Uses match_source = "structured" — action string is "{action}:{path}" or "{action}".
#
# Tier assignment:
#   Observe  — read-only operations (read, glob, grep)
#   Act      — file modification (edit)

[tools.file]
enabled = true
match_source = "structured"

[tools.file.actions.read_ops]
tier = "observe"
patterns = [
    "^read:",
    "^read$",
    "^glob:",
    "^glob$",
    "^grep:",
    "^grep$",
]

[tools.file.actions.write_ops]
tier = "act"
patterns = [
    "^edit:",
    "^edit$",
]

# ─── Memory tool (M6b) ────────────────────────────────────────────────────────
#
# Patterns match "{action}" or "{action}:{path}" depending on whether a path
# is provided. The match_source = "structured" directive activates the
# structured extractor instead of shell command parsing.
#
# Tier assignment by scope and operation:
#   Observe  — read-only (recall, search) and working-scope writes
#   Act      — user-scope writes (preferences, observations, facts)
#   Commit   — identity/agent/instruction writes; all deletes

[tools.memory]
enabled = true
match_source = "structured"

[tools.memory.actions.read]
# Recall and search are always observe-tier regardless of scope.
tier = "observe"
patterns = [
    "^recall$",
    "^recall:",
    "^search$",
    "^search:",
]

[tools.memory.actions.write_working]
# Working-scope writes are observe-tier (continuity context, low stakes).
tier = "observe"
patterns = [
    "^store:working/",
    "^update:working/",
    "^forget:working/",
]

[tools.memory.actions.write_user]
# User-scope writes require Act tier.
tier = "act"
patterns = [
    "^store:preferences/",
    "^store:observations/",
    "^store:facts/",
    "^update:preferences/",
    "^update:observations/",
    "^update:facts/",
]

[tools.memory.actions.write_identity]
# Identity, agent-scope, and instruction writes require Commit (human approval).
tier = "commit"
patterns = [
    "^store:identity/",
    "^update:identity/",
    "^store:agent/",
    "^update:agent/",
    "^store:instructions/",
    "^update:instructions/",
]

[tools.memory.actions.delete]
# All other deletes require Commit (human approval).
tier = "commit"
patterns = [
    "^forget$",
    "^forget:",
]

# ─── HTTP tool (M7b) ─────────────────────────────────────────────────────────
#
# The HTTP tool uses `match_source = "http_structured"` which extracts the
# action string as `"{method}:{host}"` from params["action"] + params["url"].
# This means patterns match the method AND host together.
#
# Tier assignment:
#   Observe  — idempotent reads (GET, HEAD)
#   Act      — state-changing writes (POST, PUT, PATCH)
#   Commit   — deletions (DELETE)
#
# IMPORTANT: Only hosts explicitly listed here are permitted. Any request to
# an unlisted host is rejected at the enforcement layer. Add allowlisted hosts
# as needed.
#
# Example (uncomment to enable):
#
# [tools.http]
# enabled = true
# match_source = "http_structured"
#
# [tools.http.actions.api_read]
# # Allow GET requests to approved API hosts.
# tier = "observe"
# patterns = [
#     "^get:api\\.stripe\\.com$",
#     "^get:api\\.github\\.com$",
# ]
#
# [tools.http.actions.api_write]
# # POST/PUT/PATCH to approved API hosts — requires Act tier (auto-allowed in CLI).
# tier = "act"
# patterns = [
#     "^post:api\\.stripe\\.com$",
#     "^put:api\\.stripe\\.com$",
#     "^patch:api\\.stripe\\.com$",
#     "^post:hooks\\.slack\\.com$",
# ]
#
# [tools.http.actions.api_delete]
# # DELETE requests — always require Commit tier (human approval in CLI).
# tier = "commit"
# patterns = [
#     "^delete:api\\.stripe\\.com$",
# ]

# ─── Dev environment tool (sandbox image builder) ────────────────────────────
#
# Allows the agent to build custom sandbox Docker images with specific
# language toolchains (rust, node, go). Python 3 is always included.
# Uses structured action matching: the action string is just "setup".
#
# Act tier: auto-allowed in CLI, requires human approval in Telegram.

[tools.dev_environment]
enabled = true
match_source = "structured"

[tools.dev_environment.actions.setup]
tier = "act"
patterns = ["^setup$"]

# ─── Budget limits (M12) ──────────────────────────────────────────────────────
#
# Enforce cost ceilings on LLM API usage. When a limit is exceeded, the
# behavior depends on `on_exceeded`:
#   "escalate" (default) — human decides whether to continue
#   "reject"             — hard stop, no tool execution
#
# Limits are checked before each tool execution. Costs are tracked per-call
# using model-specific pricing. Unknown models are tracked by token count
# but not priced (cost = 0).
#
# Requires: PostgreSQL + `sessions` feature.
#
# Example (uncomment to enable):
#
# [budget]
# session_limit_usd = 5.00
# daily_limit_usd = 25.00
# on_exceeded = "escalate"

# ─── Constraint operators ─────────────────────────────────────────────────────
#
#   eq          — exact match (string, number, bool)
#   lt / gt     — numeric comparison (strict: equal values fail)
#   contains    — substring in string, or element in array
#   not_contains — inverse of contains
#   one_of      — value must be one of the array elements
#   contains_all — all specified elements must be present (in string or array)
#   matches     — regex match against a string value
